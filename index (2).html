<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>內場夥伴自評表</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;background:#F5F5F3;color:#1a1a1a;padding-bottom:60px;}
.header{background:#fff;border-bottom:0.5px solid #E0DED8;padding:16px 20px;position:sticky;top:0;z-index:10;}
.header h1{font-size:17px;font-weight:600;}
.header p{font-size:12px;color:#888;margin-top:3px;}
.container{padding:16px;}
.notice{background:#FFF9EC;border:0.5px solid #F0D890;border-radius:10px;padding:12px 14px;font-size:13px;color:#7A5800;line-height:1.7;margin-bottom:16px;}
.card{background:#fff;border-radius:12px;padding:16px;margin-bottom:12px;border:0.5px solid #E8E6E0;}
.card-title{font-size:15px;font-weight:600;margin-bottom:4px;}
.card-sub{font-size:12px;color:#888;margin-bottom:12px;}
select{width:100%;padding:11px 12px;border-radius:8px;border:0.5px solid #D8D6D0;font-size:15px;background:#FAFAF8;color:#1a1a1a;}
select:focus{outline:none;border-color:#1a1a1a;}
.role-card{background:#fff;border-radius:12px;margin-bottom:10px;border:0.5px solid #E8E6E0;overflow:hidden;}
.role-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:#F8F7F5;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.role-name{font-size:15px;font-weight:500;}
.role-status{font-size:12px;padding:3px 10px;border-radius:20px;font-weight:500;}
.s-empty{background:#EDECE8;color:#888;}
.s-zero{background:#F1EFE8;color:#888780;}
.s-done{background:#EAF3DE;color:#3B6D11;}
.role-body{padding:14px;display:none;}
.zero-bar{display:flex;align-items:center;justify-content:space-between;background:#FFF9EC;border:0.5px solid #F0D890;border-radius:8px;padding:10px 12px;margin-bottom:14px;}
.zero-bar span{font-size:13px;color:#7A5800;}
/* iOS toggle */
.sw{position:relative;display:inline-block;width:46px;height:27px;}
.sw input{opacity:0;width:0;height:0;}
.sl{position:absolute;inset:0;background:#D8D6D0;border-radius:27px;cursor:pointer;transition:.2s;}
.sl:before{content:'';position:absolute;width:21px;height:21px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.2);}
input:checked+.sl{background:#34C759;}
input:checked+.sl:before{transform:translateX(19px);}
.sec-block{margin-bottom:14px;}
.sec-block:last-child{margin-bottom:0;}
.sec-label{font-size:13px;font-weight:500;color:#333;margin-bottom:3px;}
.sec-weight{font-size:11px;color:#aaa;margin-left:4px;}
.criteria{font-size:11px;color:#AAA;background:#F8F7F5;padding:7px 10px;border-radius:7px;line-height:1.7;margin-bottom:7px;}
.score-inp{width:100%;padding:12px;text-align:center;font-size:20px;font-weight:600;border-radius:8px;border:0.5px solid #D8D6D0;background:#FAFAF8;color:#1a1a1a;-webkit-appearance:none;}
.score-inp:focus{outline:none;border-color:#1a1a1a;background:#fff;}
.score-inp:disabled{background:#F5F5F3;color:#C8C5BE;border-color:#E8E6E0;}
.gen-btn{width:100%;padding:16px;background:#1a1a1a;color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;margin-top:4px;-webkit-tap-highlight-color:transparent;}
.gen-btn:active{opacity:0.75;}
.result-card{background:#fff;border-radius:12px;padding:16px;margin-top:14px;border:0.5px solid #9FE1CB;display:none;}
.result-title{font-size:15px;font-weight:600;color:#3B6D11;margin-bottom:4px;}
.result-sub{font-size:12px;color:#888;margin-bottom:10px;}
.code-area{width:100%;padding:12px;border-radius:8px;border:0.5px solid #E8E6E0;font-size:11px;font-family:monospace;background:#F5F5F3;min-height:72px;word-break:break-all;resize:none;color:#333;}
.copy-btn{width:100%;padding:14px;background:#EAF3DE;color:#3B6D11;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;margin-top:10px;-webkit-tap-highlight-color:transparent;}
.copy-btn:active{background:#C0DD97;}
.copy-ok{text-align:center;font-size:13px;color:#3B6D11;margin-top:8px;font-weight:500;min-height:20px;}
</style>
</head>
<body>

<div class="header">
  <h1>內場夥伴自評表</h1>
  <p id="hdr-month"></p>
</div>

<div class="container">
  <div class="notice">
    📋 <strong>填寫說明</strong><br>
    · 學過的崗位：依實際表現填入分數（1–10）<br>
    · 尚未學習的崗位：開啟右側「未學習」開關<br>
    · 全部填完後，點「產生自評碼」用 LINE 傳給主管
  </div>

  <div class="card">
    <div class="card-title">我的資料</div>
    <div class="card-sub">請先選擇姓名</div>
    <select id="sel-name" onchange="onNameChange()">
      <option value="">— 請選擇 —</option>
      <option>王大銘</option><option>鄭洪</option><option>陳佩玟</option>
      <option>謝忠翰</option><option>李雨璇</option>
      <option>朱尉廷</option><option>謝宇璇</option>
      <option>溫偉成</option><option>郭兆銘</option><option>邱畯育</option>
      <option>楊憲宇</option><option>郭維育</option><option>溫文嘉</option>
    </select>
  </div>

  <div id="roles-wrap"></div>

  <button class="gen-btn" onclick="generate()">產生自評碼</button>

  <div class="result-card" id="result-card">
    <div class="result-title">✅ 自評碼已產生</div>
    <div class="result-sub">長按全選複製，或點下方「複製」按鈕，再用 LINE 傳給主管</div>
    <textarea class="code-area" id="code-out" readonly></textarea>
    <button class="copy-btn" onclick="doCopy()">複製自評碼</button>
    <div class="copy-ok" id="copy-ok"></div>
  </div>
</div>

<script>
var ROLES = ['主爐','副爐','肉台','烤炸','擺控','甜點','備料','開早','收班'];
var SECS = [
  {id:'collab',    name:'協作與溝通',       w:'40%', hint:'10=全力協作 / 7-9=良好溝通 / 4-6=基本配合 / 1-3=協作困難'},
  {id:'efficiency',name:'工作效能與自主能力',w:'30%', hint:'10=高效協助 / 7-9=完成自身並支援 / 4-6=自身可完成 / 1-3=進度落後'},
  {id:'quality',   name:'成果品質',          w:'30%', hint:'10=精準超越客需 / 7-9=符合需求 / 4-6=基本達標 / 1-3=品質低落'}
];

var now = new Date();
var MONTH = now.getFullYear() + '-' + ('0'+(now.getMonth()+1)).slice(-2);
document.getElementById('hdr-month').textContent = MONTH + ' 考評自評表';

function onNameChange() {
  if (!document.getElementById('sel-name').value) return;
  if (!document.getElementById('roles-wrap').innerHTML) buildRoles();
}

function buildRoles() {
  var html = '';
  for (var i = 0; i < ROLES.length; i++) {
    var r = ROLES[i];
    var rid = 'r' + i;
    var secHtml = '';
    for (var j = 0; j < SECS.length; j++) {
      var s = SECS[j];
      secHtml += '<div class="sec-block">'
        + '<div class="sec-label">' + s.name + '<span class="sec-weight">' + s.w + '</span></div>'
        + '<div class="criteria">' + s.hint + '</div>'
        + '<input class="score-inp" type="number" inputmode="decimal" min="0" max="10" step="0.5" placeholder="填入 0–10 分" id="sc-' + rid + '-' + s.id + '" oninput="refreshStatus(\'' + rid + '\')">'
        + '</div>';
    }
    html += '<div class="role-card" id="card-' + rid + '">'
      + '<div class="role-header" onclick="toggleBody(\'' + rid + '\')">'
      + '<span class="role-name">' + r + '</span>'
      + '<span class="role-status s-empty" id="st-' + rid + '">未填</span>'
      + '</div>'
      + '<div class="role-body" id="body-' + rid + '">'
      + '<div class="zero-bar">'
      + '<span>尚未學習此崗位（全填 0）</span>'
      + '<label class="sw"><input type="checkbox" id="zc-' + rid + '" onchange="toggleZero(\'' + rid + '\')"><span class="sl"></span></label>'
      + '</div>'
      + secHtml
      + '</div></div>';
  }
  document.getElementById('roles-wrap').innerHTML = html;
}

function toggleBody(rid) {
  var b = document.getElementById('body-' + rid);
  b.style.display = b.style.display === 'block' ? 'none' : 'block';
}

function toggleZero(rid) {
  var isZ = document.getElementById('zc-' + rid).checked;
  for (var j = 0; j < SECS.length; j++) {
    var inp = document.getElementById('sc-' + rid + '-' + SECS[j].id);
    if (isZ) { inp.value = '0'; inp.disabled = true; }
    else      { inp.value = '';  inp.disabled = false; }
  }
  refreshStatus(rid);
}

function refreshStatus(rid) {
  var isZ = document.getElementById('zc-' + rid).checked;
  var st  = document.getElementById('st-' + rid);
  if (isZ) { st.textContent = '未學習'; st.className = 'role-status s-zero'; return; }
  var done = true;
  for (var j = 0; j < SECS.length; j++) {
    if (document.getElementById('sc-' + rid + '-' + SECS[j].id).value === '') { done = false; break; }
  }
  st.textContent = done ? '已填 ✓' : '未填';
  st.className   = done ? 'role-status s-done' : 'role-status s-empty';
}

function generate() {
  var name = document.getElementById('sel-name').value;
  if (!name) { alert('請先選擇你的名字'); return; }
  if (!document.getElementById('roles-wrap').innerHTML) { alert('請先選擇姓名，再填寫各崗位分數'); return; }
  var scores = {};
  var missing = [];
  for (var i = 0; i < ROLES.length; i++) {
    var rid = 'r' + i;
    var r   = ROLES[i];
    var isZ = document.getElementById('zc-' + rid).checked;
    scores[r] = {};
    for (var j = 0; j < SECS.length; j++) {
      var v = document.getElementById('sc-' + rid + '-' + SECS[j].id).value;
      if (!isZ && v === '') { missing.push(r); break; }
      scores[r][SECS[j].id] = isZ ? '0' : v;
    }
  }
  if (missing.length) {
    alert('以下崗位尚未填完：\n' + missing.join('、') + '\n\n未學習的崗位請開啟「未學習」開關');
    return;
  }
  var payload = JSON.stringify({v:2, month:MONTH, name:name, scores:scores});
  var code = 'SELF2:' + btoa(unescape(encodeURIComponent(payload)));
  document.getElementById('code-out').value = code;
  document.getElementById('result-card').style.display = 'block';
  document.getElementById('copy-ok').textContent = '';
  setTimeout(function(){ document.getElementById('result-card').scrollIntoView({behavior:'smooth'}); }, 100);
}

function doCopy() {
  var t = document.getElementById('code-out').value;
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(t).then(function(){
      document.getElementById('copy-ok').textContent = '已複製！用 LINE 傳給主管 ✓';
    });
  } else {
    var ta = document.getElementById('code-out');
    ta.select(); ta.setSelectionRange(0, 99999);
    document.execCommand('copy');
    document.getElementById('copy-ok').textContent = '已複製！用 LINE 傳給主管 ✓';
  }
}
</script>
</body>
</html>
